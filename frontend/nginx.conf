# Config nginx du conteneur « web » : sert le build statique du frontend (SPA)
# et fait office de reverse-proxy interne vers le backend FastAPI.
# Le TLS et le domaine public (ruches.corsicajack.fr) sont gérés EN AMONT par
# le proxy inverse du Synology — ici on ne parle qu'en HTTP sur le port 80.

# Préserve le schéma d'origine : si le proxy inverse Synology a déjà positionné
# X-Forwarded-Proto (https), on le conserve ; sinon on retombe sur $scheme (http).
map $http_x_forwarded_proto $client_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # En-têtes de sécurité (le HSTS est ajouté par le proxy inverse Synology)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression des assets texte
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # ─── API REST ────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $client_proto;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
    }

    # ─── WebSocket (temps réel) ──────────────────────────────────
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Forwarded-Proto $client_proto;
        proxy_set_header X-Forwarded-Host  $http_host;
        proxy_read_timeout 3600s;
    }

    # ─── Fichiers uploadés (factures, photos ruches) ─────────────
    # Volume partagé avec le backend, monté en lecture seule.
    location /uploads/ {
        alias /app/uploads/;
        autoindex off;
        access_log off;
        expires 7d;
    }

    # Le service worker ne doit jamais être mis en cache par le navigateur,
    # sinon les mises à jour de l'app ne sont pas prises en compte.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # Assets versionnés (hash dans le nom) : cache long.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── SPA : toute autre route renvoie index.html ──────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
