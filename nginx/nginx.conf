events { worker_connections 1024; }

http {
    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }

    # ---------------------------------------------------------------------------
    # HTTP (port 80) : challenge ACME Let's Encrypt + redirection vers HTTPS:7080
    # Le port 80 doit rester accessible depuis Internet pour le renouvellement
    # automatique du certificat (validation HTTP-01).
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name ruches.corsicajack.fr localhost;

        # Challenge ACME (validation du domaine par Let's Encrypt)
        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
            access_log off;
        }

        # Tout le reste est redirigé en HTTPS sur le port public 7080
        location / {
            return 301 https://$host:7080$request_uri;
        }
    }

    # ---------------------------------------------------------------------------
    # HTTPS (interne 443, publié sur le port 7080) : interface web sécurisée
    # ---------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name ruches.corsicajack.fr localhost;
        client_max_body_size 20M;

        # Certificats Let's Encrypt (renouvelés automatiquement par certbot)
        ssl_certificate     /etc/letsencrypt/live/ruches.corsicajack.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ruches.corsicajack.fr/privkey.pem;

        # Paramètres TLS modernes (Mozilla intermediate)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        location ^~ /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 120s;
        }

        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /uploads/ {
            alias /app/uploads/;
            autoindex off;
            access_log off;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
