services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: rucher
      POSTGRES_USER: rucher
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rucher_secret_2026}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rucher"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.standard
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://rucher:${POSTGRES_PASSWORD:-rucher_secret_2026}@postgres:5432/rucher
      DATABASE_URL_SYNC: postgresql://rucher:${POSTGRES_PASSWORD:-rucher_secret_2026}@postgres:5432/rucher
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@rucher.local}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin1234}
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: rucher-frontend:latest
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/vite.config.js:/app/vite.config.js:ro
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:7080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  upload_data:
