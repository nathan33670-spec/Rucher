services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: rucher
      POSTGRES_USER: rucher
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rucher_secret_2026}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rucher"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.standard
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://rucher:${POSTGRES_PASSWORD:-rucher_secret_2026}@postgres:5432/rucher
      DATABASE_URL_SYNC: postgresql://rucher:${POSTGRES_PASSWORD:-rucher_secret_2026}@postgres:5432/rucher
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@rucher.local}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin1234}
    volumes:
      - upload_data:/app/uploads
      - ./backend/app:/app/app:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.standard
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.js:/app/vite.config.js:ro
      - ./frontend/public:/app/public:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      # HTTP : port HAUT côté hôte (évite tout conflit avec le port 80 déjà utilisé
      # par d'autres applis). Sert uniquement au challenge ACME Let's Encrypt et à la
      # redirection vers HTTPS. Pour le renouvellement auto, le port 80 PUBLIC doit
      # être redirigé (NAT/box) vers ce port (HTTP_PORT).
      - "${HTTP_PORT:-7081}:80"
      # HTTPS : port public frontal de l'interface web
      - "${HTTPS_PORT:-7080}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - upload_data:/app/uploads:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    # Recharge nginx toutes les 6h pour prendre en compte les certificats renouvelés
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Tente un renouvellement du certificat toutes les 12h (no-op si non expiré)
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  pg_data:
  upload_data:
  certbot_conf:
  certbot_www:
